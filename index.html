<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SerialZero</title>
    <!-- 1. Custom Styles -->
    <link rel="stylesheet" href="static/style.css">
    
    <!-- 2. Xterm.js Core Styles (CRITICAL) -->
    <link rel="stylesheet" href="static/lib/xterm.css">
    
    <!-- 3. Xterm.js Core Logic (CRITICAL) -->
    <script src="static/lib/xterm.js"></script>
    
    <!-- 4. Xterm.js Fit Addon (CRITICAL) -->
    <script src="static/lib/xterm-addon-fit.js"></script>
</head>
<body>
    <!-- Top Toolbar -->
    <div class="toolbar">
        <button id="toggle-sidebar-btn" class="icon-btn" title="Toggle Sidebar">☰</button>
        <span class="title">SerialZero</span>
        <div class="status-bar">
            <span id="connection-status">Disconnected</span>
            <span id="port-info">COM1 | 9600</span>
        </div>
        <div class="actions">
            <button id="connect-btn" class="action-btn">Connect</button>
            <button id="scan-btn" class="tool-btn">Scan</button>
            <button id="clear-btn" class="tool-btn">Clear</button>
            <button id="export-btn" class="tool-btn">Export</button>
            <!-- Moved Script Toggle Button Here -->
            <button id="toggle-script-btn" class="icon-btn" title="Toggle Script Panel">🤖</button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Left Sidebar -->
        <div id="sidebar" class="sidebar">
            <div class="config-section">
                <h3>Serial Port</h3>
                <label>Port: <input type="text" id="port-input" value="COM1"></label>
                <label>Baudrate: <input type="number" id="baud-input" value="9600"></label>
                <label>Data Bits:
                    <select id="databits-select">
                        <option value="8" selected>8</option>
                        <option value="7">7</option>
                        <option value="6">6</option>
                        <option value="5">5</option>
                    </select>
                </label>
                <label>Stop Bits:
                    <select id="stopbits-select">
                        <option value="1" selected>1</option>
                        <option value="2">2</option>
                    </select>
                </label>
                <label>Parity:
                    <select id="parity-select">
                        <option value="N" selected>None</option>
                        <option value="E">Even</option>
                        <option value="O">Odd</option>
                    </select>
                </label>
            </div>

            <div class="config-section">
                <h3>Display</h3>
                <label>Font: <input type="text" id="font-input" value="Consolas, monospace"></label>
                <label>Font Size: <input type="number" id="fontsize-input" value="14"></label>
                <label>Mode:
                    <div class="toggle-group">
                        <input type="radio" id="ascii-mode" name="mode" value="ascii" checked> ASCII
                        <input type="radio" id="hex-mode" name="mode" value="hex"> HEX
                    </div>
                </label>
                <label>Timestamp:
                    <div class="toggle-group">
                        <input type="radio" id="timestamp-on" name="timestamp" value="on" checked> ON
                        <input type="radio" id="timestamp-off" name="timestamp" value="off"> OFF
                    </div>
                </label>
                <label>SHELL:
                    <div class="toggle-group">
                        <input type="radio" id="shell-on" name="shell" value="on" checked> ON
                        <input type="radio" id="shell-off" name="shell" value="off"> OFF
                    </div>
                </label>
            </div>

            <div class="config-section">
                <h3>Highlight (regex:color)</h3>
                <textarea id="highlight-input" rows="4" spellcheck="false"></textarea>
            </div>

            <!-- Theme Configuration -->
            <div class="config-section">
                <h3>Theme</h3>
                <label>Preset:
                    <select id="theme-preset-select">
                        <option value="Default">Default</option>
                        <option value="Dracula">Dracula</option>
                        <option value="Monokai">Monokai</option>
                        <option value="Solarized">Solarized Dark</option>
                        <option value="Gruvbox">Gruvbox</option>
                        <option value="Nord">Nord</option>
                        <option value="Custom">Custom</option>
                    </select>
                </label>
                <div id="custom-theme-area" style="display: none; flex-direction: column; gap: 5px; margin-top: 5px;">
                    <label>Background: <input type="color" id="theme-bg" value="#1e1e1e"></label>
                    <label>Foreground: <input type="color" id="theme-fg" value="#cccccc"></label>
                    <label>Cursor: <input type="color" id="theme-cursor" value="#ffffff"></label>
                </div>
            </div>

            <button id="save-config-btn" class="action-btn" style="margin-top: auto;">Save Config</button>
        </div>

        <!-- Middle Terminal Area -->
        <div class="terminal-wrapper">
            <div id="output-container" class="output-container">
                <div id="output" class="output" tabindex="0"></div>
            </div>
            <div id="terminal-container" class="terminal-container"></div>
            <div id="input-area" class="input-area">
                <button id="toggle-input-btn" class="toggle-input-btn">▼ Send</button>
                <div class="input-row">
                    <input type="text" id="input" placeholder="Type here...">
                    <button id="send-btn" class="action-btn">Send</button>
                </div>
            </div>
        </div>

        <!-- Right Script Panel -->
        <div id="script-panel" class="script-panel collapsed"> <!-- Default collapsed -->
            <div class="script-header">
                <span class="script-title">🤖 Automation Script</span>
            </div>
            
            <div class="script-content">
                <div class="script-controls">
                    <select id="script-select" style="flex: 1;">
                        <option value="">-- Select Script --</option>
                    </select>
                    <button id="refresh-scripts-btn" class="icon-btn" title="Refresh List">🔄</button>
                </div>
                
                <div style="display: flex; gap: 5px; margin-top: 5px;">
                    <button id="run-script-btn" class="action-btn" style="flex:1; background-color: var(--success-color);">▶ Run</button>
                    <button id="stop-script-btn" class="action-btn" style="flex:1; background-color: var(--danger-color);">⏹ Stop</button>
                </div>

                <div class="script-status">
                    Status: <span id="script-status-text" style="color: var(--text-secondary);">Idle</span>
                </div>

                <div class="script-console-label">Console Output:</div>
                <div id="script-console" class="script-console"></div>
            </div>
        </div>
    </div>

    <!-- Port Scan Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- 5. Custom Logic must be last -->
    <script src="static/app.js"></script>
</body>
</html>
